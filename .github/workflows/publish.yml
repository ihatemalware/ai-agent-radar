name: Publish AI Agent Radar

on:
  push:
    branches: [main]
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

concurrency:
  group: daily-paragraph-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify generator
        run: python3 release_radar.py --self-test
      - name: Verify Paragraph key
        env:
          PARAGRAPH_API_KEY: ${{ secrets.PARAGRAPH_API_KEY }}
        run: python3 release_radar.py --check-key
      - name: Generate and publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PARAGRAPH_API_KEY: ${{ secrets.PARAGRAPH_API_KEY }}
        run: python3 release_radar.py --auto
